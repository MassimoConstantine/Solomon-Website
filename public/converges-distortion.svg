<svg width="100%" viewBox="0 0 680 312" role="img" style="" xmlns="http://www.w3.org/2000/svg">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Optimization converges onto a slightly distorted reality while edge cases vanish</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A distribution over outputs in black on transparent. A solid vertical line marks true reality. A dashed line just to its right marks the centre the model converges to. A wide dashed hump and a narrow solid spike share that off centre, showing that more optimization tightens the fit onto the slightly wrong centre. Edge-case dots in the wide tails are gone from the spike. The small gap between reality and the centre is labelled the distortion.</desc>
